repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: |
          (?x)^(
            .*\.lock$|
            .*pnpm-lock\.yaml$|
            .*\.venv/.*|
            .*node_modules/.*|
            .*\.env\.example$
          )$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=10000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']

  # Block bare asyncio.create_task / ensure_future — tasks not held by
  # a strong reference get garbage-collected before they run.
  # See docs/rules/asyncio-create-task.md.
  - repo: local
    hooks:
      - id: asyncio-create-task-guard
        name: asyncio.create_task guard
        entry: scripts/check_asyncio_tasks.sh
        language: script
        pass_filenames: false
        files: ^backend/.*\.py$
