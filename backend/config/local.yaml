# config/local.yaml — Full local development, zero external services
# Usage: OMOIOS_ENV=local just dev-all
#
# This overlay sets all providers to local mode so no external API keys
# are needed. Secrets still come from .env / .env.local (never here).
#
# Pydantic priority: env vars > .env.local > .env > YAML defaults

llm:
  mode: "null"  # Disable LLM calls (use null/replay mode)

git:
  provider: "local"  # Use local git instead of GitHub API

sandbox:
  provider: "local"  # Use local sandboxes instead of Daytona

orchestrator:
  dry_run: true  # Don't actually spawn sandboxes

monitoring:
  replay_mode: true  # Use replay mode for monitoring

event_bus:
  persist_events: true  # Persist events for replay

database:
  url: "postgresql+psycopg://postgres:postgres@localhost:15432/app_db"

redis:
  url: "redis://localhost:16379"


spec:
  fixture_mode: true